<!DOCTYPE html>
<html>
<head>
    <title>Vehicle Detection</title>

    <style>
        body {
            text-align: center;
            margin-top: 50px;
            font-family: Arial;
            background-color: #f5f5f5;
        }

        .box {
            background: white;
            padding: 30px;
            margin: auto;
            width: 400px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        button {
            padding: 10px 20px;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #1e40af;
        }

        input {
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>🚗 Vehicle Detection</h2>

    <!-- ✅ IMPORTANT FORM -->
    <form action="/detect_vehicle" method="POST" enctype="multipart/form-data">
        <input type="file" name="image" accept="image/*" required>
        <br><br>
        <button type="submit">Upload & Detect</button>
    </form>

    <br>

    <!-- ✅ RESULT DISPLAY -->
    {% if result %}

        <h3>Detection Result:</h3>

        {% if result.predictions|length > 0 %}
            <p style="color:green;">✅ Vehicle Detected</p>
        {% else %}
            <p style="color:red;">❌ No Vehicle Found</p>
        {% endif %}

        <br>

        <!-- OPTIONAL DEBUG OUTPUT -->
        <details>
            <summary>View Raw Output</summary>
            <pre>{{ result }}</pre>
        </details>

    {% endif %}

</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Detection</title>
</head>
<body style="text-align:center; margin-top:50px;">

<h2>🚗 Upload Image for Detection</h2>

<form action="/detect_vehicle" method="POST" enctype="multipart/form-data">
    <input type="file" name="image" required>
    <br><br>
    <button type="submit">Upload & Detect</button>
</form>

{% if result %}
    <h3>Result:</h3>

    {% if result.outputs[0].predictions|length > 0 %}
        <p style="color:green;">✅ Vehicle Detected</p>
    {% else %}
        <p style="color:red;">❌ No Vehicle Found</p>
    {% endif %}
{% endif %}

</body>
</html>

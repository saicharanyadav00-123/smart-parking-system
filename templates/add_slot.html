<!DOCTYPE html>
<html>
<head>
    <title>Add Slot</title>

    <!-- LEAFLET MAP -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        body {
            text-align: center;
            background: linear-gradient(to right, #0f172a, #1e293b, #065f46);
            color: white;
            font-family: Arial;
        }

        h2 {
            margin-top: 20px;
        }

        #map {
            height: 300px;
            width: 80%;
            margin: 20px auto;
            border-radius: 10px;
        }

        input {
            padding: 10px;
            width: 250px;
            margin: 10px;
            border-radius: 5px;
            border: none;
        }

        button {
            padding: 10px 20px;
            background: #22c55e;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h2>📍 Add Parking Slot</h2>
<p>Click on map to select location</p>

<div id="map"></div>

<form method="POST">

    <input type="text" name="address" placeholder="Enter Address" required><br>

    <input type="text" id="lat" name="latitude" placeholder="Latitude" readonly required><br>

    <input type="text" id="lon" name="longitude" placeholder="Longitude" readonly required><br>

    <button type="submit">Add Slot</button>

</form>

<script>
var map = L.map('map').setView([17.3850, 78.4867], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

var marker;

map.on('click', function(e) {

    if(marker) {
        map.removeLayer(marker);
    }

    marker = L.marker(e.latlng).addTo(map);

    document.getElementById("lat").value = e.latlng.lat;
    document.getElementById("lon").value = e.latlng.lng;
});
</script>

</body>
</html>

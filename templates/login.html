<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        body {
            background: linear-gradient(to right, #0f172a, #1e293b, #065f46);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial;
        }

        .login-box {
            background: #020617;
            padding: 30px;
            border-radius: 15px;
            width: 320px;
            text-align: center;
            box-shadow: 0 0 20px rgba(34,197,94,0.3);
        }

        h2 {
            color: white;
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
        }

        button {
            width: 95%;
            padding: 10px;
            margin-top: 10px;
            background: #22c55e;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #16a34a;
        }

        .admin-btn {
            background: #3b82f6;
        }

        .admin-btn:hover {
            background: #2563eb;
        }

        .link {
            margin-top: 10px;
            color: #94a3b8;
        }

        a {
            color: #38bdf8;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="login-box">

    <h2>Login</h2>

    <form method="POST">

        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>

    </form>

    <!-- 🔥 ADMIN LOGIN BUTTON -->
    <a href="/admin_login">
        <button class="admin-btn">Admin Login</button>
    </a>

    <div class="link">
        New user? <a href="/register">Register</a>
    </div>

</div>

</body>
</html>

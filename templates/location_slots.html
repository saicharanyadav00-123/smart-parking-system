<!DOCTYPE html>
<html>
<head>
    <title>Slots</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        body {
            background: linear-gradient(to right, #0f172a, #1e293b, #065f46);
            color: white;
        }

        h2 {
            text-align: center;
            margin-top: 20px;
        }

        .slots {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            padding: 30px;
        }

        .slot-card {
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            transition: 0.3s;
            position: relative;
        }

        /* FREE SLOT */
        .free {
            border: 2px solid #22c55e;
            box-shadow: 0 0 15px #22c55e;
        }

        /* BOOKED SLOT */
        .booked {
            border: 2px solid #ef4444;
            box-shadow: 0 0 15px #ef4444;
            opacity: 0.7;
        }

        .slot-card:hover {
            transform: scale(1.05);
        }

        .slot-id {
            font-size: 20px;
            margin-bottom: 10px;
        }

        .status {
            margin: 10px 0;
            font-weight: bold;
        }

        .free .status {
            color: #22c55e;
        }

        .booked .status {
            color: #ef4444;
        }

        .book-btn {
            display: inline-block;
            padding: 8px 15px;
            border-radius: 8px;
            background: #22c55e;
            color: white;
            text-decoration: none;
            transition: 0.3s;
        }

        .book-btn:hover {
            background: #16a34a;
        }

        .disabled {
            background: gray;
            cursor: not-allowed;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            padding: 15px;
            background: #020617;
        }

        .navbar a {
            color: white;
            margin-left: 15px;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="navbar">
    <h3>Smart Parking</h3>
    <div>
        <a href="/dashboard">Home</a>
        <a href="/logout">Logout</a>
    </div>
</div>

<h2>Available Slots</h2>

<div class="slots">

{% for slot in slots %}
    <div class="slot-card {{slot.status}}">

        <div class="slot-id">Slot {{slot.id}}</div>

        <div class="status">
            {{slot.status.upper()}}
        </div>

        {% if slot.status == "free" %}
            <a href="/create_order/{{slot.id}}" class="book-btn">
                Book Now
            </a>
        {% else %}
            <button class="book-btn disabled">
                Occupied
            </button>
        {% endif %}

    </div>
{% endfor %}

</div>

</body>
</html>
